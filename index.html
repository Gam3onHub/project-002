<script>
// Clean Counter - Shows perfect "10K+" 
document.addEventListener('DOMContentLoaded', () => {

  function animateCounter(el) {
    const target = parseFloat(el.getAttribute('data-count'));
    const duration = 1600;
    let current = 0;
    const increment = target / (duration / 16);

    const suffixSpan = el.querySelector('.suffix');

    const timer = setInterval(() => {
      current += increment;
      if (current >= target) {
        current = target;
        clearInterval(timer);
      }

      let display = '';

      if (target === 4.9) {
        display = current.toFixed(1);
      } else if (target === 98) {
        display = Math.floor(current) + '%';
      } else if (target === 24) {
        display = Math.floor(current);
      } else {
        // For 10000 → show only the number "10" (suffix will add "K+")
        display = Math.floor(current / 1000);
      }

      // Update only the number part
      if (suffixSpan) {
        el.firstChild.textContent = display;
      } else {
        el.textContent = display;
      }
    }, 20);
  }

  function startCounters() {
    const counters = document.querySelectorAll('.trust-bar h3[data-count]');
    counters.forEach(counter => {
      if (counter.classList.contains('animated')) return;

      const suffix = counter.querySelector('.suffix');
      if (suffix) {
        counter.innerHTML = '0<span class="suffix">K+</span>';
      } else {
        counter.textContent = '0';
      }

      animateCounter(counter);
      counter.classList.add('animated');
    });
  }

  // Observer + fallbacks
  const observer = new IntersectionObserver((entries) => {
    if (entries[0].isIntersecting) {
      startCounters();
      observer.disconnect();
    }
  }, { threshold: 0.3, rootMargin: '-50px 0px -100px 0px' });

  const trustBar = document.querySelector('.trust-bar');
  if (trustBar) observer.observe(trustBar);

  let fallbackUsed = false;
  window.addEventListener('scroll', () => {
    if (!fallbackUsed && window.scrollY > 250) {
      fallbackUsed = true;
      startCounters();
    }
  });

  setTimeout(() => {
    if (!document.querySelector('.trust-bar h3.animated')) {
      startCounters();
    }
  }, 1800);

});
</script>
